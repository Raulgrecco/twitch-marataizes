<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Entenda Sua Cidade — Biblioteca de Educação para a Cidadania | TV Marataízes</title>
<meta name="description" content="Série permanente de educação para a cidadania. Entenda, de forma simples, como funciona a administração pública, a fiscalização do dinheiro público e a saúde na sua cidade." />
<meta property="og:title" content="Entenda Sua Cidade — TV Marataízes" />
<meta property="og:description" content="Informação que empodera a cidadania que transforma." />
<meta property="og:image" content="https://raw.githubusercontent.com/Raulgrecco/twitch-marataizes/main/clima/entenda.png" />
<meta name="theme-color" content="#0a0a0a" />
<style>
:root{--gold:#D4AF37;--gold2:#EFE0B0;--max:1100px;}
*{box-sizing:border-box}
html,body{margin:0;background:#000;color:#fff;font-family:system-ui,Arial,sans-serif;}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
.wrap{max-width:var(--max);margin:0 auto;padding:0 16px;}
header.hero{background:linear-gradient(180deg,#000,#0a0a0a 60%);padding:36px 0 26px;text-align:center;border-bottom:1px solid #2a2210;}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.eyebrow::before,.eyebrow::after{content:'';width:26px;height:1px;background:var(--gold);opacity:.6;}
h1{font-family:Georgia,'Times New Roman',serif;font-size:34px;color:var(--gold2);margin:14px 0 8px;letter-spacing:.5px;}
.tag{font-size:13px;color:#9a9a9a;max-width:520px;margin:0 auto;}
.backhome{display:inline-block;margin-top:18px;font-size:11px;color:#9a9a9a;border:1px solid #333;padding:6px 14px;border-radius:20px;}
.backhome:hover{border-color:var(--gold);color:var(--gold2);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:34px 0 50px;}
.card{background:#111;border:1px solid rgba(212,175,55,.22);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s;}
.card:hover{transform:translateY(-3px);border-color:rgba(212,175,55,.55);}
.thumb{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0) 45%, rgba(0,0,0,.88) 100%);}
.badge{position:absolute;top:9px;left:9px;z-index:2;background:rgba(0,0,0,.75);border:1px solid var(--gold);color:var(--gold);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.body{padding:16px 17px 18px;}
.ctitle{font-size:15px;font-weight:800;color:#fff;line-height:1.35;margin-bottom:8px;}
.cdesc{font-size:12px;color:#9c9c9c;line-height:1.55;margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#E9CB6B,#B8860B);color:#000;font-size:11.5px;font-weight:800;padding:8px 16px;border-radius:20px;}
footer{text-align:center;padding:30px 16px 44px;font-size:11px;color:#666;border-top:1px solid #1a1a1a;}
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <span class="eyebrow">Biblioteca de Cidadania</span>
    <h1>📚 Entenda Sua Cidade</h1>
    <div class="tag">Informação que empodera a cidadania que transforma. Para você entender, acompanhar e participar.</div>
    <a class="backhome" href="/">← Voltar para a home</a>
  </div>
</header>

<div class="wrap">
  <div class="grid" id="hub-grid"></div>
</div>

<footer>TV Marataízes · TV Piúma · TV Sul Capixaba — Macuca Produções</footer>

<script>
// Mesma lista usada na home. Ao adicionar um novo episódio na home (index.html),
// replique o mesmo objeto aqui para ele também aparecer nesta biblioteca completa.
var ESC_EPISODIOS = [
  {
    badge: 'Especial 1',
    titulo: 'Como Funciona a Administração Pública',
    desc: 'Entenda, de forma simples, o papel do vereador, presidente da Câmara, prefeito, secretários, emendas, licitações, Portal da Transparência, Lei de Acesso à Informação, royalties, IPTU, de onde vem o dinheiro público e quem decide onde ele será aplicado.',
    thumb: 'https://raw.githubusercontent.com/Raulgrecco/twitch-marataizes/main/clima/entenda.png',
    url: '/entenda-sua-cidade/especial-1/'
  },
  {
    badge: 'Especial 2',
    titulo: 'Fiscalização e Como a Máquina Pública Funciona',
    desc: 'Aprenda como funcionam o Ministério Público, Tribunal de Contas, Controladoria, convênios, concursos públicos, pregão eletrônico, dispensa, inexigibilidade, obras públicas, hospitais, contratação de shows, medicamentos e outros temas da administração pública.',
    thumb: 'https://raw.githubusercontent.com/Raulgrecco/twitch-marataizes/main/clima/entenda.png',
    url: '/entenda-sua-cidade/especial-2/'
  },
  {
    badge: 'Especial Saúde',
    titulo: 'REMUME × RENAME',
    desc: 'Você sabe a diferença entre oferecer mais medicamentos e realmente tê-los disponíveis para a população? Entenda como funciona a lista municipal de medicamentos e o compromisso assumido quando um medicamento entra na REMUME.',
    thumb: 'https://raw.githubusercontent.com/Raulgrecco/twitch-marataizes/main/clima/entenda2.png',
    url: '/entenda-sua-cidade/remume-rename/'
  }
];
(function(){
  var grid = document.getElementById('hub-grid');
  var html = '';
  ESC_EPISODIOS.forEach(function(ep){
    html += '<a class="card" href="'+ep.url+'">'
          +   '<div class="thumb"><span class="badge">'+ep.badge+'</span><img src="'+ep.thumb+'" alt="'+ep.titulo+'"></div>'
          +   '<div class="body"><div class="ctitle">'+ep.titulo+'</div><div class="cdesc">'+ep.desc+'</div><span class="btn">▶ Assistir</span></div>'
          + '</a>';
  });
  grid.innerHTML = html;
})();
</script>
</body>
</html>
